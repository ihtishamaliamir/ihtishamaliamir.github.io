# Site Settings
title: "Ihtisham's Cybersecurity Journey"
description: "Documenting my journey through cybersecurity, one challenge at a time"
author: "Ihtisham Ali Amir"
baseurl: ""
url: "https://ihtishamaliamir.github.io"

# Navigation
nav:
  - name: "🏠 Home"
    url: "/"
  - name: "📝 Blogs"
    url: "/blogs/"
  - name: "🎮 OverTheWire"
    url: "/overthewire/"
  - name: "🎯 Bandit"
    url: "/overthewire/bandit/"

# Build Settings
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge

permalink: /:path/

plugins:
  - jekyll-feed
  - jekyll-seo-tag

defaults:
  - scope:
      path: ""
    values:
      layout: "default"