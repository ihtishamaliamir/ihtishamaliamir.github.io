# Site Settings
title: "Ihtisham Ali Amir | Cybersecurity Portfolio"
description: "Cybersecurity student passionate about penetration testing, CTFs, and security research"
author: "Ihtisham Ali Amir"
baseurl: ""
url: "https://ihtishamaliamir.github.io"

# Build Settings
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge

permalink: /:path/

plugins:
  - jekyll-feed
  - jekyll-seo-tag

defaults:
  - scope:
      path: ""
    values:
      layout: "default"
  - scope:
      path: "documentary/**/*.md"
    values:
      layout: "default"