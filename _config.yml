# Site Settings
title: "Ihtisham's Cybersecurity Journey"
description: "Documenting my journey through OverTheWire, CTFs, and cybersecurity concepts"
author: "Ihtisham Ali Amir"
baseurl: ""
url: "https://ihtishamaliamir.github.io"

# Navigation
nav:
  - name: "🏠 Home"
    url: "/"
  - name: "📝 Blogs"
    url: "/blogs/"
  - name: "🎮 OverTheWire"
    url: "/overthewire/"
  - name: "🎯 Bandit"
    url: "/bandit/"

# Build Settings
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Permalinks
permalink: /:categories/:title/

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Defaults
defaults:
  - scope:
      path: ""
    values:
      layout: "default"