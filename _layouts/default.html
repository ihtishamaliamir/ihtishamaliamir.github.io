<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/assets/images/favicon.png" type="image/png">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ site.description }}">
    
    <!-- CSS -->
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
    <div class="container">
        <!-- Navigation -->
        <nav class="navbar">
            <div class="nav-brand">
                <span class="terminal-prompt">$</span>
                <a href="/" class="brand-link">ihtisham@portfolio:~</a>
            </div>
            
            <div class="nav-menu">
                <a href="/" class="nav-link">🏠 Home</a>
                <a href="/whoami/" class="nav-link">📋 whoami</a>
                
                <div class="dropdown">
                    <button class="dropbtn">📂 documentary ▾</button>
                    <div class="dropdown-content">
                        <a href="/documentary/overthewire/">🎮 OverTheWire</a>
                        <a href="/documentary/ctf/">🏴 CTF Writeups</a>
                        <a href="/documentary/notes/">📝 Security Notes</a>
                    </div>
                </div>
                
                <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
                    <span id="themeIcon">🌙</span>
                </button>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="content">
            {{ content }}
        </main>

        <!-- Footer -->
        <footer>
            <p>
                Built with <span class="heart">♥</span> by {{ site.author }} &bull;
                <a href="https://github.com/ihtishamaliamir" target="_blank">GitHub</a> &bull;
                <a href="https://linkedin.com/in/ihtishamaliamir" target="_blank">LinkedIn</a>
            </p>
            <p class="footer-small">
                Last updated: {{ site.time | date: "%B %d, %Y" }}
            </p>
        </footer>
    </div>

    <!-- JavaScript -->
    <script src="/assets/js/main.js"></script>
</body>
</html>
