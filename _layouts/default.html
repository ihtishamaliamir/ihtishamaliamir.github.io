<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/assets/images/favicon.png" type="image/png">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ site.description }}">
    
    <style>
        /* Global Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            line-height: 1.7;
            padding: 20px;
        }

        /* Container */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Navigation */
        nav {
            background: #161b22;
            padding: 15px 25px;
            border-radius: 10px;
            margin-bottom: 30px;
            border: 1px solid #30363d;
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
        }

        nav a {
            color: #58a6ff;
            text-decoration: none;
            font-weight: 500;
            font-size: 1.05em;
            transition: color 0.2s;
        }

        nav a:hover {
            color: #79c0ff;
            text-decoration: underline;
        }

        /* Main Content */
        .content {
            background: #161b22;
            padding: 35px 40px;
            border-radius: 10px;
            border: 1px solid #30363d;
        }

        /* Headings */
        h1 {
            color: #f0f6fc;
            font-size: 2.2em;
            margin-bottom: 20px;
            border-bottom: 2px solid #30363d;
            padding-bottom: 10px;
        }

        h2 {
            color: #f0f6fc;
            font-size: 1.6em;
            margin-top: 30px;
            margin-bottom: 15px;
        }

        h3 {
            color: #f0f6fc;
            font-size: 1.3em;
            margin-top: 25px;
            margin-bottom: 10px;
        }

        h4 {
            color: #f0f6fc;
            font-size: 1.1em;
            margin-top: 20px;
            margin-bottom: 8px;
        }

        /* Paragraphs & Lists */
        p {
            margin-bottom: 15px;
        }

        ul, ol {
            margin: 10px 0 15px 25px;
        }

        li {
            margin-bottom: 5px;
        }

        /* Links */
        a {
            color: #58a6ff;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        /* Code Blocks */
        pre {
            background: #0d1117;
            padding: 16px 20px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 15px 0;
            border: 1px solid #30363d;
            font-size: 0.9em;
        }

        code {
            background: #0d1117;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.9em;
            color: #f0f6fc;
        }

        pre code {
            background: none;
            padding: 0;
            color: #c9d1d9;
        }

        /* Tables */
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
            font-size: 0.95em;
        }

        th {
            background: #21262d;
            color: #f0f6fc;
            padding: 10px 15px;
            text-align: left;
            border: 1px solid #30363d;
        }

        td {
            padding: 10px 15px;
            border: 1px solid #30363d;
        }

        /* Images */
        img {
            max-width: 100%;
            border-radius: 8px;
            margin: 15px 0;
            border: 1px solid #30363d;
        }

        /* Blockquotes */
        blockquote {
            border-left: 4px solid #58a6ff;
            padding: 10px 20px;
            margin: 15px 0;
            background: #0d1117;
            border-radius: 0 8px 8px 0;
        }

        blockquote p {
            margin-bottom: 0;
        }

        /* Custom Boxes */
        .note {
            background: #1c2333;
            padding: 15px 20px;
            border-radius: 8px;
            border-left: 4px solid #58a6ff;
            margin: 15px 0;
        }

        .tip {
            background: #1c2a1c;
            padding: 15px 20px;
            border-radius: 8px;
            border-left: 4px solid #3fb950;
            margin: 15px 0;
        }

        .warning {
            background: #2d1a1a;
            padding: 15px 20px;
            border-radius: 8px;
            border-left: 4px solid #f85149;
            margin: 15px 0;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 25px 0 10px 0;
            color: #8b949e;
            font-size: 0.9em;
            border-top: 1px solid #30363d;
            margin-top: 30px;
        }

        footer a {
            color: #58a6ff;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .content {
                padding: 20px;
            }
            
            nav {
                flex-direction: column;
                gap: 10px;
            }
            
            h1 {
                font-size: 1.8em;
            }
            
            h2 {
                font-size: 1.3em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Navigation -->
        <nav>
            <a href="/">🏠 Home</a>
            <a href="/overthewire/">🎮 OverTheWire</a>
            <a href="/overthewire/bandit/">🎯 Bandit</a>
        </nav>

        <!-- Main Content -->
        <div class="content">
            {{ content }}
        </div>

        <!-- Footer -->
        <footer>
    <p>
        Built by {{ site.author }} &bull; 
        <a href="https://github.com/ihtishamaliamir/ihtishamaliamir.github.io" target="_blank">Source Code</a> &bull;
        <a href="https://github.com/ihtishamaliamir" target="_blank">GitHub</a> &bull;
        <a href="https://linkedin.com/in/ihtishamaliamir" target="_blank">LinkedIn</a>
    </p>
    <p style="font-size: 0.85em; color: #8b949e;">
        Last updated: {{ site.time | date: "%B %d, %Y" }}
    </p>
</footer>
    </div>
</body>
</html>
